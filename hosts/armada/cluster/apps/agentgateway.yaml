# ─── Agentgateway ────────────────────────────────────────────────────────────
# Centralized LLM + MCP gateway for the homelab.
# Rust-based, Linux Foundation project. Proxies to upstream LLM providers
# (OpenRouter, Anthropic, OpenAI) with spend controls, MCP tool federation,
# and OpenTelemetry observability.
#
# LLM endpoint: http://agentgateway:4000 (cluster-internal)
# MCP endpoint: http://agentgateway:4000 (same port, /mcp path)
# UI:           https://ai.${DOMAIN} (behind tinyauth)

# ─── Deployment ──────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentgateway
  namespace: default
  labels:
    app.kubernetes.io/name: agentgateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agentgateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentgateway
    spec:
      initContainers:
        - name: write-config
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              cat <<'EOF' > /etc/agentgateway/config.yaml
              # yaml-language-server: $schema=https://agentgateway.dev/schema/config
              binds:
              - port: 3000
              EOF
          volumeMounts:
            - name: config
              mountPath: /etc/agentgateway
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      containers:
        - name: agentgateway
          image: ghcr.io/agentgateway/agentgateway:v1.1.0
          args:
            - -f
            - /etc/agentgateway/config.yaml
          env:
            - name: ADMIN_ADDR
              value: "0.0.0.0:15000"
          envFrom:
            - secretRef:
                name: agentgateway
          ports:
            - name: llm
              containerPort: 4000
              protocol: TCP
            - name: ui
              containerPort: 15000
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/agentgateway
          resources:
            limits:
              memory: 128Mi
              cpu: 500m
            requests:
              memory: 32Mi
              cpu: 50m
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          startupProbe:
            httpGet:
              path: /healthz/ready
              port: 15021
            failureThreshold: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz/ready
              port: 15021
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: 15021
            periodSeconds: 10
      volumes:
        - name: config
          emptyDir: {}
---
# ─── Service ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: agentgateway
  namespace: default
  labels:
    app.kubernetes.io/name: agentgateway
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: "AI"
    gethomepage.dev/name: "Agentgateway"
    gethomepage.dev/icon: "mdi-robot"
    gethomepage.dev/href: "https://ai.${DOMAIN}"
    gethomepage.dev/description: "LLM & MCP Gateway"
spec:
  selector:
    app.kubernetes.io/name: agentgateway
  ports:
    - name: llm
      port: 4000
      targetPort: llm
    - name: ui
      port: 15000
      targetPort: ui
---
# ─── Ingress (UI — behind tinyauth) ─────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentgateway-ui
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    traefik.ingress.kubernetes.io/router.middlewares: auth-tinyauth@kubernetescrd
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: "AI"
    gethomepage.dev/name: "Agentgateway"
    gethomepage.dev/icon: "agentgateway"
    gethomepage.dev/href: "https://ui.ai.${DOMAIN}"
    gethomepage.dev/description: "LLM & MCP Gateway"
spec:
  ingressClassName: traefik
  rules:
    - host: "ui.ai.${DOMAIN}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agentgateway
                port:
                  number: 15000
  tls:
    - secretName: agentgateway-ui-tls
      hosts:
        - "ui.ai.${DOMAIN}"
---
# ─── Ingress (LLM API — behind tinyauth) ────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentgateway-api
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    traefik.ingress.kubernetes.io/router.middlewares: auth-tinyauth@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: "ai.${DOMAIN}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agentgateway
                port:
                  number: 4000
  tls:
    - secretName: agentgateway-api-tls
      hosts:
        - "ai.${DOMAIN}"
