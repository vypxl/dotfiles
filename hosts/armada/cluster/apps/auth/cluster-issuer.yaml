# ─── Let's Encrypt ClusterIssuer ──────────────────────────────────────────────
# Lives in apps/ (not infra/) because it depends on cert-manager CRDs
# which are installed by the infra layer.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: "${ACME_EMAIL}"
    privateKeySecretRef:
      name: letsencrypt-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: traefik
