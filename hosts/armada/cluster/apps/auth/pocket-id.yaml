# ─── Pocket ID StatefulSet ────────────────────────────────────────────────────
# Secrets are in secrets.yaml (SOPS-encrypted)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pocket-id
  namespace: auth
  labels:
    app.kubernetes.io/name: pocket-id
spec:
  serviceName: pocket-id
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pocket-id
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pocket-id
    spec:
      containers:
        - name: pocket-id
          image: ghcr.io/pocket-id/pocket-id:v2.6.2
          ports:
            - name: http
              containerPort: 1411
              protocol: TCP
          env:
            - name: APP_URL
              value: "https://id.${DOMAIN}"
            - name: TRUST_PROXY
              value: "true"
          envFrom:
            - secretRef:
                name: pocket-id
          volumeMounts:
            - name: pocket-id-data
              mountPath: /app/data
          resources:
            limits:
              memory: 128Mi
              cpu: 200m
            requests:
              memory: 64Mi
              cpu: 50m
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: pocket-id-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
---
# ─── Pocket ID Service ───────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: pocket-id
  namespace: auth
  labels:
    app.kubernetes.io/name: pocket-id
spec:
  selector:
    app.kubernetes.io/name: pocket-id
  ports:
    - name: http
      port: 1411
      targetPort: http
---
# ─── Pocket ID Ingress ───────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pocket-id
  namespace: auth
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
spec:
  ingressClassName: traefik
  rules:
    - host: "id.${DOMAIN}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pocket-id
                port:
                  number: 1411
  tls:
    - secretName: pocket-id-tls
      hosts:
        - "id.${DOMAIN}"
