# ─── Tinyauth Deployment ─────────────────────────────────────────────────────
# Secrets are in secrets.yaml (SOPS-encrypted)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tinyauth
  namespace: auth
  labels:
    app.kubernetes.io/name: tinyauth
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tinyauth
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tinyauth
    spec:
      containers:
        - name: tinyauth
          image: ghcr.io/steveiliop56/tinyauth:v5
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: TINYAUTH_APPURL
              value: "https://auth.${DOMAIN}"
            - name: TINYAUTH_OAUTH_PROVIDERS_POCKETID_AUTHURL
              value: "https://id.${DOMAIN}/authorize"
            - name: TINYAUTH_OAUTH_PROVIDERS_POCKETID_TOKENURL
              value: "https://id.${DOMAIN}/api/oidc/token"
            - name: TINYAUTH_OAUTH_PROVIDERS_POCKETID_USERINFOURL
              value: "https://id.${DOMAIN}/api/oidc/userinfo"
            - name: TINYAUTH_OAUTH_PROVIDERS_POCKETID_REDIRECTURL
              value: "https://auth.${DOMAIN}/api/oauth/callback/pocketid"
            - name: TINYAUTH_OAUTH_PROVIDERS_POCKETID_SCOPES
              value: "openid email profile groups"
            - name: TINYAUTH_OAUTH_PROVIDERS_POCKETID_NAME
              value: "Pocket ID"
          envFrom:
            - secretRef:
                name: tinyauth
          resources:
            limits:
              memory: 64Mi
              cpu: 100m
            requests:
              memory: 32Mi
              cpu: 25m
          livenessProbe:
            exec:
              command:
                - tinyauth
                - healthcheck
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            exec:
              command:
                - tinyauth
                - healthcheck
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: tinyauth
  namespace: auth
  labels:
    app.kubernetes.io/name: tinyauth
spec:
  selector:
    app.kubernetes.io/name: tinyauth
  ports:
    - name: http
      port: 3000
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tinyauth
  namespace: auth
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
spec:
  ingressClassName: traefik
  rules:
    - host: "auth.${DOMAIN}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tinyauth
                port:
                  number: 3000
  tls:
    - secretName: tinyauth-tls
      hosts:
        - "auth.${DOMAIN}"
