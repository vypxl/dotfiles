# ─── Ingress ─────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: firecrawl
  namespace: firecrawl
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    traefik.ingress.kubernetes.io/router.middlewares: auth-tinyauth@kubernetescrd
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: "AI"
    gethomepage.dev/name: "Firecrawl"
    gethomepage.dev/icon: "firecrawl"
    gethomepage.dev/href: "https://firecrawl.${DOMAIN}"
    gethomepage.dev/description: "Web crawling API"
spec:
  ingressClassName: traefik
  rules:
    - host: "firecrawl.${DOMAIN}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: firecrawl-api
                port:
                  number: 3002
  tls:
    - secretName: firecrawl-tls
      hosts:
        - "firecrawl.${DOMAIN}"
