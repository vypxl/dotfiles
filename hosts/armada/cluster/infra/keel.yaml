apiVersion: v1
kind: Namespace
metadata:
  name: keel
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-traefik-to-keel
  namespace: keel
spec:
  podSelector:
    matchLabels:
      app: keel
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - protocol: TCP
          port: 9300
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: keel-basic-auth-header
  namespace: keel
spec:
  headers:
    customRequestHeaders:
      Authorization: "Basic YWRtaW46YWRtaW4="
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: keel
  namespace: flux-system
spec:
  interval: 24h
  url: https://charts.keel.sh
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keel
  namespace: keel
spec:
  interval: 30m
  chart:
    spec:
      chart: keel
      sourceRef:
        kind: HelmRepository
        name: keel
        namespace: flux-system
  values:
    # The dashboard is only shipped on the latest Keel image.
    image:
      tag: latest
      pullPolicy: Always

    helmProvider:
      enabled: false

    polling:
      enabled: true
      defaultSchedule: "@every 6h"

    service:
      enabled: true
      type: ClusterIP
      externalPort: 9300

    secret:
      create: true

    basicauth:
      enabled: true
      user: admin
      password: admin

    ingress:
      enabled: true
      ingressClassName: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt
        traefik.ingress.kubernetes.io/router.middlewares: auth-tinyauth@kubernetescrd,keel-keel-basic-auth-header@kubernetescrd
        gethomepage.dev/enabled: "true"
        gethomepage.dev/group: "Infra"
        gethomepage.dev/name: "Keel"
        gethomepage.dev/icon: "keel"
        gethomepage.dev/href: "https://keel.${DOMAIN}"
        gethomepage.dev/description: "Image update automation"
      hosts:
        - host: "keel.${DOMAIN}"
          paths:
            - /
      tls:
        - secretName: keel-tls
          hosts:
            - "keel.${DOMAIN}"

    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 25m
        memory: 64Mi
