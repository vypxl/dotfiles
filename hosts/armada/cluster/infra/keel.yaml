apiVersion: v1
kind: Namespace
metadata:
  name: keel
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: keel
  namespace: flux-system
spec:
  interval: 24h
  url: https://charts.keel.sh
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keel
  namespace: keel
spec:
  interval: 24h
  timeout: 15m
  chart:
    spec:
      chart: keel
      sourceRef:
        kind: HelmRepository
        name: keel
        namespace: flux-system
  values:
    # The dashboard is only shipped on the latest Keel image.
    image:
      tag: latest
      pullPolicy: Always

    helmProvider:
      enabled: false

    polling:
      enabled: true
      defaultSchedule: "@every 6h"

    service:
      enabled: true
      type: ClusterIP
      externalPort: 9300

    secret:
      create: false
      name: keel

    ingress:
      enabled: true
      ingressClassName: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt
        traefik.ingress.kubernetes.io/router.middlewares: auth-tinyauth@kubernetescrd
        gethomepage.dev/enabled: "true"
        gethomepage.dev/group: "Infra"
        gethomepage.dev/name: "Keel"
        gethomepage.dev/icon: "keel"
        gethomepage.dev/href: "https://keel.${DOMAIN}"
        gethomepage.dev/description: "Image update automation"
      hosts:
        - host: "keel.${DOMAIN}"
          paths:
            - /
      tls:
        - secretName: keel-tls
          hosts:
            - "keel.${DOMAIN}"

    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 25m
        memory: 64Mi
